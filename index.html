<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Time Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    height: 100%;
  }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0e17;
    color: #e2e8f0;
    margin: 0; padding: 0;
    height: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* ── Floating controls ── */
  .controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    gap: 10px;
    align-items: stretch;
    flex-wrap: nowrap;
    justify-content: center;
    max-width: 95vw;
  }
  .control-panel {
    background: rgba(15, 22, 41, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(30, 45, 74, 0.8);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .control-panel svg {
    width: 16px; height: 16px; color: #64748b; flex-shrink: 0;
  }
  .control-panel input {
    background: transparent;
    border: none;
    color: #e2e8f0;
    font-size: 0.88rem;
    outline: none;
    width: 200px;
  }
  .control-panel input::placeholder { color: #475569; }
  .control-panel input[type="time"] {
    width: auto; cursor: pointer; color-scheme: dark;
  }
  .control-panel .label-text {
    font-size: 0.72rem; color: #8b5cf6; font-weight: 700;
    white-space: nowrap; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .btn-clear {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171; font-size: 0.75rem; font-weight: 600;
    padding: 4px 10px; border-radius: 8px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-clear:hover { background: rgba(239,68,68,0.3); }

  /* ── Search results ── */
  .search-section { position: relative; }
  .search-results {
    position: absolute; bottom: calc(100% + 6px); left: 0; right: 0;
    background: rgba(15,22,41,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid #1e2d4a; border-radius: 12px;
    max-height: 280px; overflow-y: auto; display: none;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6); min-width: 280px;
  }
  .search-results.show { display: block; }
  .search-result-item {
    padding: 9px 14px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    transition: background 0.12s; font-size: 0.88rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .search-result-item:hover { background: rgba(59,130,246,0.12); }
  .search-result-item .tz-label { color: #64748b; font-size: 0.75rem; }

  /* ── Map container ── */
  .map-wrap {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #070b14; cursor: grab;
    /* Prevent iOS Safari from hijacking touch for page scroll/zoom */
    touch-action: none;
    -webkit-overflow-scrolling: auto;
    -webkit-user-select: none;
    user-select: none;
  }
  .map-wrap:active { cursor: grabbing; }
  .map-wrap > svg { display: block; width: 100%; height: 100%; }

  /* ── City labels (HTML overlaid on SVG) ── */
  .city-labels { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
  .city-label {
    position: absolute;
    transform: translate(-50%, -100%);
    display: flex; flex-direction: column; align-items: center;
    white-space: nowrap; pointer-events: auto; cursor: default;
    transition: transform 0.1s;
  }
  .cl-future-time {
    font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: #c084fc;
    text-shadow: 0 0 10px rgba(139,92,246,0.5), 0 1px 5px rgba(0,0,0,1);
    display: none;
  }
  .cl-future-time.show { display: block; }
  .cl-future-date {
    font-size: 9px; color: #a78bfa;
    text-shadow: 0 1px 4px rgba(0,0,0,1);
    display: none; margin-bottom: 1px;
  }
  .cl-future-date.show { display: block; }
  .cl-time {
    font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: #f1f5f9;
    text-shadow: 0 0 8px rgba(0,0,0,1), 0 1px 4px rgba(0,0,0,1);
  }
  .cl-time.dimmed { font-size: 10px; opacity: 0.45; }
  .cl-city {
    font-size: 10px; font-weight: 600;
    text-shadow: 0 0 6px rgba(0,0,0,1), 0 1px 3px rgba(0,0,0,1);
    display: flex; align-items: center; gap: 4px; margin-top: 1px;
  }
  .cl-offset {
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
  }
  .off-plus { background: rgba(59,130,246,0.4); color: #93c5fd; }
  .off-minus { background: rgba(249,115,22,0.4); color: #fdba74; }
  .off-zero { background: rgba(16,185,129,0.35); color: #6ee7b7; }
  .cl-dot {
    width: 8px; height: 8px; border-radius: 50%; margin-top: 3px;
    border: 1.5px solid rgba(255,255,255,0.5);
  }
  .cl-remove {
    position: absolute; top: -2px; right: -18px;
    background: rgba(239,68,68,0.85); border: none; color: white;
    width: 16px; height: 16px; border-radius: 50%;
    font-size: 10px; line-height: 16px; text-align: center;
    cursor: pointer; opacity: 0; transition: opacity 0.15s;
    pointer-events: auto;
  }
  .city-label:hover .cl-remove { opacity: 1; }
  .city-label.show-remove .cl-remove { opacity: 1; }

  /* ── Reverse lookup (hover-to-convert) ── */
  .cl-reverse-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    margin-bottom: 2px;
  }
  .city-label.reverse-active .cl-reverse-wrap, .city-label.show-remove .cl-reverse-wrap { display: flex; }
  .city-label.reverse-active .cl-time, .city-label.show-remove .cl-time { display: none; }
  .city-label.reverse-active .cl-future-time, .city-label.show-remove .cl-future-time { display: none; }
  .cl-reverse-input {
    width: 64px;
    background: rgba(15, 22, 41, 0.95);
    border: 1px solid rgba(139, 92, 246, 0.5);
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    padding: 3px 6px;
    outline: none;
    font-variant-numeric: tabular-nums;
  }
  .cl-reverse-input::placeholder { color: #6366f1; font-weight: 400; font-size: 10px; }
  .cl-reverse-input:focus { border-color: #8b5cf6; box-shadow: 0 0 8px rgba(139,92,246,0.3); }
  .cl-reverse-result {
    font-size: 11px;
    font-weight: 700;
    color: #34d399;
    text-shadow: 0 0 8px rgba(52,211,153,0.4), 0 1px 4px rgba(0,0,0,1);
    white-space: nowrap;
  }
  .cl-reverse-label {
    font-size: 8px;
    color: #6ee7b7;
    text-shadow: 0 1px 3px rgba(0,0,0,1);
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Map click hint (nearest city tooltip) ── */
  .map-click-hint {
    position: absolute;
    pointer-events: none;
    background: rgba(15, 22, 41, 0.92);
    border: 1px solid rgba(59, 130, 246, 0.4);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    color: #93c5fd;
    white-space: nowrap;
    transform: translate(-50%, -100%) translateY(-12px);
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 500;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .map-click-hint.show { opacity: 1; }

  /* ── Date labels on map ── */
  .date-label {
    position: absolute;
    font-size: 11px; font-weight: 700; white-space: nowrap;
    pointer-events: none; letter-spacing: 0.3px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7);
    transition: opacity 0.3s;
    z-index: 900;
  }
  .date-label-left {
    color: #e2e8f0;
    transform: translateX(-100%) translateX(-12px);
  }
  .date-label-right {
    color: #e2e8f0;
    transform: translateX(12px);
  }
  .date-label.today { color: #ffffff; opacity: 1; font-size: 12px; }
  .date-label.other-day { color: #94a3b8; opacity: 0.55; font-size: 11px; }

  /* ── Home location setting ── */
  .home-btn {
    position: relative;
    background: rgba(15, 22, 41, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(30, 45, 74, 0.8);
    border-radius: 10px;
    padding: 6px 10px;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; color: #94a3b8; font-size: 0.75rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: all 0.15s; white-space: nowrap;
  }
  .home-btn:hover { border-color: rgba(139,92,246,0.5); color: #c4b5fd; }
  .home-btn svg { width: 14px; height: 14px; }
  .home-btn .home-tz { font-weight: 600; color: #e2e8f0; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
  .home-picker {
    position: absolute; bottom: calc(100% + 6px); right: 0;
    background: rgba(15,22,41,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid #1e2d4a; border-radius: 12px;
    max-height: 280px; overflow-y: auto; display: none;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6); min-width: 240px;
    z-index: 1001;
  }
  .home-picker.show { display: block; }
  .home-picker input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    color: #e2e8f0; font-size: 0.85rem; padding: 10px 14px; outline: none;
  }
  .home-picker input::placeholder { color: #475569; }
  .home-picker-results { max-height: 230px; overflow-y: auto; }
  .home-picker-item {
    padding: 8px 14px; cursor: pointer; font-size: 0.85rem;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.12s;
  }
  .home-picker-item:hover { background: rgba(139,92,246,0.12); }
  .home-picker-item .tz-label { color: #64748b; font-size: 0.72rem; }

  /* ── Title overlay ── */
  .title-overlay {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%); z-index: 1000;
    pointer-events: none; text-align: center;
  }
  .title-overlay h1 {
    font-size: 1.2rem; font-weight: 700; opacity: 0.6;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 3px; }

  @media (max-width: 640px) {
    .controls { bottom: 8px; gap: 6px; flex-direction: column; align-items: center; left: 50%; transform: translateX(-50%); width: max-content; }
    .control-panel input { width: 140px; }
  }
</style>
</head>
<body>

<!-- Map -->
<div class="map-wrap" id="mapWrap">
  <svg id="mapSvg" viewBox="0 0 1000 500" preserveAspectRatio="none">
    <defs>
      <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#0c1524"/>
        <stop offset="50%" stop-color="#0a1220"/>
        <stop offset="100%" stop-color="#080e1a"/>
      </linearGradient>
    </defs>
    <!-- 3 ocean tiles for wrapping -->
    <rect x="-1000" width="1000" height="500" fill="url(#oceanGrad)"/>
    <rect width="1000" height="500" fill="url(#oceanGrad)"/>
    <rect x="1000" width="1000" height="500" fill="url(#oceanGrad)"/>
    <!-- Timezone grid (3 copies) -->
    <g id="tzGrid" opacity="0.08" stroke="#3b82f6" stroke-width="0.5"></g>
    <!-- Date line (midnight) — 3 copies managed by JS -->
    <line id="dateLine" x1="500" y1="0" x2="500" y2="500" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
    <line id="dateLine2" x1="500" y1="0" x2="500" y2="500" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
    <line id="dateLine3" x1="500" y1="0" x2="500" y2="500" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
    <!-- Land (3 copies for wrapping) -->
    <path id="landPath" fill="#1a2d4a" stroke="#2a4a6e" stroke-width="0.3" stroke-linejoin="round"/>
    <g id="landLeft" transform="translate(-1000,0)"><path id="landPathL" fill="#1a2d4a" stroke="#2a4a6e" stroke-width="0.3" stroke-linejoin="round"/></g>
    <g id="landRight" transform="translate(1000,0)"><path id="landPathR" fill="#1a2d4a" stroke="#2a4a6e" stroke-width="0.3" stroke-linejoin="round"/></g>
    <!-- Day/Night overlay (3 copies) -->
    <g id="dayNightLayer">
      <path id="dayPath" fill="rgba(255,200,80,0.12)" stroke="none"/>
      <path id="twilightPath" fill="rgba(200,140,60,0.08)" stroke="none"/>
      <path id="nightPath" fill="rgba(0,2,15,0.45)" stroke="none"/>
    </g>
    <g id="dayNightLeft" transform="translate(-1000,0)">
      <path id="dayPathL" fill="rgba(255,200,80,0.12)" stroke="none"/>
      <path id="twilightPathL" fill="rgba(200,140,60,0.08)" stroke="none"/>
      <path id="nightPathL" fill="rgba(0,2,15,0.45)" stroke="none"/>
    </g>
    <g id="dayNightRight" transform="translate(1000,0)">
      <path id="dayPathR" fill="rgba(255,200,80,0.12)" stroke="none"/>
      <path id="twilightPathR" fill="rgba(200,140,60,0.08)" stroke="none"/>
      <path id="nightPathR" fill="rgba(0,2,15,0.45)" stroke="none"/>
    </g>
    <!-- Equator (3 copies) -->
    <line x1="-1000" y1="250" x2="0" y2="250" stroke="#3b82f6" stroke-width="0.3" stroke-dasharray="3,6" opacity="0.15"/>
    <line x1="0" y1="250" x2="1000" y2="250" stroke="#3b82f6" stroke-width="0.3" stroke-dasharray="3,6" opacity="0.15"/>
    <line x1="1000" y1="250" x2="2000" y2="250" stroke="#3b82f6" stroke-width="0.3" stroke-dasharray="3,6" opacity="0.15"/>
    <!-- City pin dots (SVG layer) -->
    <g id="pinDots"></g>
  </svg>
  <!-- HTML city labels overlaid -->
  <div class="city-labels" id="cityLabels"></div>
  <!-- Date labels -->
  <div class="date-label date-label-left" id="dateLabelLeft"></div>
  <div class="date-label date-label-right" id="dateLabelRight"></div>
  <!-- Click hint tooltip -->
  <div class="map-click-hint" id="mapClickHint"></div>
  <!-- Floating Controls (inside map, at bottom) -->
  <div class="controls">
    <div class="control-panel search-section">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
      <input type="text" id="citySearch" placeholder="Add a city..." autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="control-panel" style="flex-wrap:wrap;justify-content:center;">
      <span class="label-text">Plan Ahead</span>
      <input type="text" id="futureTime" placeholder="e.g. 5pm" maxlength="7" style="width:72px;text-align:center;font-variant-numeric:tabular-nums;" title="Enter a time: 5pm, 10am, 17:00, 1430...">
      <button class="btn-clear" id="clearFuture" style="display:none;" onclick="clearFutureTime()">Clear</button>
      <div style="width:100%;text-align:center;font-size:9px;color:#64748b;margin-top:-2px;">See what time it'll be everywhere</div>
    </div>
    <div class="home-btn" id="homeBtn" onclick="toggleHomePicker()" title="Change your home location">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
      <span class="home-tz" id="homeTzLabel"></span>
      <div class="home-picker" id="homePicker">
        <input type="text" id="homeSearch" placeholder="Search city..." autocomplete="off" onclick="event.stopPropagation()">
        <div class="home-picker-results" id="homeResults"></div>
      </div>
    </div>
  </div>
</div>

<div class="title-overlay"><h1>World Time Machine</h1></div>

// ============ MAP PROJECTION & INTERACTION ============
const svgEl = document.getElementById('mapSvg');
const mapWrap = document.getElementById('mapWrap');
let vb = { x: 0, y: 0, w: 1000, h: 500 };
const INIT_VB = { x: 0, y: 0, w: 1000, h: 500 };

function wrapVBX(x) {
  // Normalize vb.x into [-500, 1500) range for infinite horizontal wrapping
  while (x < -500) x += 1000;
  while (x >= 1500) x -= 1000;
  return x;
}

function getDefaultW() {
  // Default zoom: fill vertically (vb.h = 500), width follows from container AR
  const rect = mapWrap.getBoundingClientRect();
  if (!rect.height || !rect.width) return 1000; // safety fallback
  return 500 * (rect.width / rect.height);
}

function updateViewBox() {
  const rect = mapWrap.getBoundingClientRect();
  if (!rect.height || !rect.width) return; // container not laid out yet
  const containerAR = rect.width / rect.height;
  // Clamp width: min 150 (zoomed in), no upper cap — wide screens need > 1000
  vb.w = Math.max(150, vb.w);
  // Height derived from width + container shape to maintain correct proportions
  vb.h = vb.w / containerAR;
  // Ensure height never exceeds map bounds (500); if it would, widen instead
  if (vb.h > 500) {
    vb.h = 500;
    vb.w = 500 * containerAR;
  }
  // Wrap horizontally instead of clamping — infinite scrolling
  vb.x = wrapVBX(vb.x);
  // Clamp vertical: keep within the map's 0–500 range
  vb.y = Math.max(0, Math.min(500 - vb.h, vb.y));
  svgEl.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  positionLabels();
}

// Convert screen coords to SVG coords properly
function screenToSVG(clientX, clientY) {
  const ctm = svgEl.getScreenCTM();
  if (!ctm) return { x: vb.x + vb.w/2, y: vb.y + vb.h/2 };
  const inv = ctm.inverse();
  return {
    x: inv.a * clientX + inv.c * clientY + inv.e,
    y: inv.b * clientX + inv.d * clientY + inv.f
  };
}

// Zoom with mouse wheel
mapWrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const scale = e.deltaY > 0 ? 1.12 : 0.89;
  const pt = screenToSVG(e.clientX, e.clientY);
  const nw = vb.w * scale;
  const nh = vb.h * scale;
  vb.x = pt.x - (pt.x - vb.x) * scale;
  vb.y = pt.y - (pt.y - vb.y) * scale;
  vb.w = nw; vb.h = nh;
  updateViewBox();
}, { passive: false });

// Pan with drag
let dragging = false, dragStart = {};
mapWrap.addEventListener('mousedown', (e) => {
  if (e.target.closest('.city-label')) return;
  dragging = true;
  const svgPt = screenToSVG(e.clientX, e.clientY);
  dragStart = { sx: e.clientX, sy: e.clientY, vx: vb.x, vy: vb.y, svgX: svgPt.x, svgY: svgPt.y };
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const svgPt = screenToSVG(e.clientX, e.clientY);
  // How far did the cursor move in SVG space? Shift viewBox by the opposite amount.
  const ctm = svgEl.getScreenCTM();
  if (!ctm) return;
  const dx = (e.clientX - dragStart.sx) / ctm.a;
  const dy = (e.clientY - dragStart.sy) / ctm.d;
  vb.x = dragStart.vx - dx;
  vb.y = dragStart.vy - dy;
  updateViewBox();
});
window.addEventListener('mouseup', () => dragging = false);

// Touch support (pan/zoom only — city adding is via search on mobile)
let touchStart = null, touchDist = null;
mapWrap.addEventListener('touchstart', (e) => {
  if (e.target.closest('.control-panel') || e.target.closest('.home-picker') || e.target.closest('.city-label')) return;
  e.preventDefault();
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, vx: vb.x, vy: vb.y };
  } else if (e.touches.length === 2) {
    touchDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
  }
}, { passive: false });
mapWrap.addEventListener('touchmove', (e) => {
  if (e.target.closest('.control-panel') || e.target.closest('.home-picker') || e.target.closest('.city-label')) return;
  e.preventDefault();
  if (e.touches.length === 1 && touchStart) {
    const ctm = svgEl.getScreenCTM();
    if (!ctm) return;
    const dx = (e.touches[0].clientX - touchStart.x) / ctm.a;
    const dy = (e.touches[0].clientY - touchStart.y) / ctm.d;
    vb.x = touchStart.vx - dx;
    vb.y = touchStart.vy - dy;
    updateViewBox();
  } else if (e.touches.length === 2 && touchDist) {
    const newDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    const scale = touchDist / newDist;
    vb.w *= scale; vb.h *= scale;
    touchDist = newDist;
    updateViewBox();
  }
}, { passive: false });
mapWrap.addEventListener('touchend', (e) => {
  touchStart = null; touchDist = null;
  if (!e.target.closest('.city-label')) {
    labelsContainer.querySelectorAll('.city-label.show-remove').forEach(el => {
      el.classList.remove('show-remove');
      deactivateReverse(el);
    });
  }
});

// Double-click to reset zoom
mapWrap.addEventListener('dblclick', (e) => {
  if (e.target.closest('.city-label')) return;
  vb.x = 0; vb.y = 0; vb.w = getDefaultW();
  updateViewBox();
});

// ============ COORDINATE HELPERS ============
function lngToSVGX(lng) { return (lng + 180) / 360 * 1000; }
function latToSVGY(lat) { return (90 - lat) / 180 * 500; }
function svgToScreen(sx, sy) {
  const ctm = svgEl.getScreenCTM();
  if (!ctm) return { x: 0, y: 0 };
  const wrapRect = mapWrap.getBoundingClientRect();
  return {
    x: ctm.a * sx + ctm.c * sy + ctm.e - wrapRect.left,
    y: ctm.b * sx + ctm.d * sy + ctm.f - wrapRect.top
  };
}

const pinDotsGroup = document.getElementById('pinDots');

function buildLabelHTML(city, index) {
  const color = PIN_COLORS[index % PIN_COLORS.length];
  const diff = getOffsetDiff(localTZ, city.tz);
  let offText, offClass;
  if (diff > 0) { offText = `+${diff}h`; offClass = 'off-plus'; }
  else if (diff < 0) { offText = `${diff}h`; offClass = 'off-minus'; }
  else { offText = '±0'; offClass = 'off-zero'; }

  const time = formatTime(city.tz);
  let futureHTML = '';
  if (futureMode && futureUTCMoment) {
    const ft = formatTime(city.tz, futureUTCMoment);
    const fd = futureUTCMoment.toLocaleDateString('en-US', { timeZone: city.tz, weekday:'short', month:'short', day:'numeric' });
    futureHTML = `<div class="cl-future-time show">${ft}</div>`;
  }

  return `<div class="city-label" data-idx="${index}">
    <button class="cl-remove" onclick="event.stopPropagation();removeCity(${index})">✕</button>
    <div class="cl-reverse-wrap">
      <div class="cl-reverse-label">time there</div>
      <input class="cl-reverse-input" type="text" placeholder="e.g. 3pm" maxlength="7" data-tz="${city.tz}" onclick="event.stopPropagation();" onmousedown="event.stopPropagation();">
      <div class="cl-reverse-result" data-tz="${city.tz}"></div>
    </div>
    ${futureHTML}
    <div class="cl-time${futureMode?' dimmed':''}" data-tz="${city.tz}">${time}</div>
    <div class="cl-city" style="color:${color}">
      ${city.name}
      <span class="cl-offset ${offClass}">${offText}</span>
    </div>
    <div class="cl-dot" style="background:${color};box-shadow:0 0 8px ${color}"></div>
  </div>`;
}

function rebuildLabels() {
  labelsContainer.innerHTML = selectedCities.map((c,i) => buildLabelHTML(c,i)).join('');
  // SVG pin dots — render 3 copies for wrapping (center, left -1000, right +1000)
  pinDotsGroup.innerHTML = selectedCities.map((c,i) => {
    const color = PIN_COLORS[i % PIN_COLORS.length];
    const sx = lngToSVGX(c.lng), sy = latToSVGY(c.lat);
    return [-1000, 0, 1000].map(offset => `<circle cx="${sx + offset}" cy="${sy}" r="3" fill="${color}" opacity="0.25">
      <animate attributeName="r" values="3;7;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.08;0.25" dur="2s" repeatCount="indefinite"/>
    </circle>`).join('');
  }).join('');
  positionLabels();
  attachHoverHandlers();
}

// ============ HOVER-TO-CONVERT (REVERSE LOOKUP) ============
let activeReverseLabel = null;

function attachHoverHandlers() {
  const labels = labelsContainer.querySelectorAll('.city-label');
  labels.forEach(el => {
    el.addEventListener('mouseenter', () => {
      activeReverseLabel = el;
      el.classList.add('reverse-active');
      const input = el.querySelector('.cl-reverse-input');
      if (input) setTimeout(() => input.focus(), 50);
    });
    el.addEventListener('mouseleave', (e) => {
      if (el.contains(document.activeElement) && document.activeElement.classList.contains('cl-reverse-input')) return;
      if (el.classList.contains('show-remove')) return;
      deactivateReverse(el);
    });
    // Mobile: tap label to show remove button + reverse input
    el.addEventListener('click', (e) => {
      if (!('ontouchstart' in window)) return;
      if (e.target.closest('.cl-reverse-input')) return;
      const removeBtn = el.querySelector('.cl-remove');
      if (e.target === removeBtn || removeBtn.contains(e.target)) return;
      e.stopPropagation();
      const wasActive = el.classList.contains('show-remove');
      labels.forEach(other => {
        other.classList.remove('show-remove');
        deactivateReverse(other);
      });
      if (!wasActive) {
        el.classList.add('show-remove');
        activeReverseLabel = el;
        el.classList.add('reverse-active');
        const input = el.querySelector('.cl-reverse-input');
        if (input) setTimeout(() => input.focus(), 100);
      }
    });
    // Handle input for reverse conversion
    const input = el.querySelector('.cl-reverse-input');
    if (input) {
      input.addEventListener('input', () => onReverseInput(el));
      input.addEventListener('blur', () => {
        // Small delay so mouseleave can fire first
        setTimeout(() => {
          if (activeReverseLabel === el && !el.matches(':hover')) {
            deactivateReverse(el);
          }
        }, 150);
      });
    }
  });
}

function deactivateReverse(el) {
  el.classList.remove('reverse-active');
  const input = el.querySelector('.cl-reverse-input');
  const result = el.querySelector('.cl-reverse-result');
  if (input) input.value = '';
  if (result) result.textContent = '';
  if (activeReverseLabel === el) activeReverseLabel = null;
}

function onReverseInput(el) {
  const input = el.querySelector('.cl-reverse-input');
  const result = el.querySelector('.cl-reverse-result');
  if (!input || !result) return;

  const t = parseTimeFlexible(input.value);
  if (!t) { result.textContent = ''; return; }

  const remoteTZ = input.dataset.tz;

  // Build a "target moment" in the remote TZ, then convert to local TZ
  const now = new Date();
  const dateStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + 'T' +
    String(t.h).padStart(2,'0') + ':' + String(t.min).padStart(2,'0') + ':00';
  // Iterative solve: find the UTC moment where formatTime(remoteTZ) == entered time
  let guess = new Date(dateStr);
  const target = new Date(dateStr);
  for (let i = 0; i < 4; i++) {
    const g = new Date(guess.toLocaleString('en-US', { timeZone: remoteTZ }));
    guess = new Date(guess.getTime() + (target - g));
  }
  // Now 'guess' is the UTC moment. Format in local TZ.
  const localTime = formatTime(localTZ, guess);
  result.textContent = 'Your time: ' + localTime;
}

// ============ CLICK ON MAP TO ADD NEAREST CITY ============
const mapClickHint = document.getElementById('mapClickHint');
let clickDownPos = null;

function svgXToLng(x) { return (x / 1000) * 360 - 180; }
function svgYToLat(y) { return 90 - (y / 500) * 180; }

function findNearestCity(svgX, svgY) {
  // Normalize svgX to center tile [0, 1000) for comparison
  let normX = svgX;
  while (normX < 0) normX += 1000;
  while (normX >= 1000) normX -= 1000;
  let best = null, bestDist = Infinity;
  CITIES.forEach(c => {
    const cx = lngToSVGX(c.lng), cy = latToSVGY(c.lat);
    const d = (cx - normX) ** 2 + (cy - svgY) ** 2;
    if (d < bestDist) { bestDist = d; best = c; }
  });
  return best;
}

// Show hint on mousemove over map (only when not dragging)
mapWrap.addEventListener('mousemove', (e) => {
  if (dragging) { mapClickHint.classList.remove('show'); return; }
  if (e.target.closest('.city-label') || e.target.closest('.control-panel')) {
    mapClickHint.classList.remove('show'); return;
  }
  const svgPt = screenToSVG(e.clientX, e.clientY);
  const nearest = findNearestCity(svgPt.x, svgPt.y);
  if (nearest) {
    const alreadyAdded = selectedCities.find(c => c.name === nearest.name && c.country === nearest.country);
    const wrapRect = mapWrap.getBoundingClientRect();
    mapClickHint.textContent = alreadyAdded ? `${nearest.name} (already added)` : `+ ${nearest.name}, ${nearest.country}`;
    mapClickHint.style.left = (e.clientX - wrapRect.left) + 'px';
    mapClickHint.style.top = (e.clientY - wrapRect.top) + 'px';
    mapClickHint.classList.add('show');
    mapWrap.style.cursor = alreadyAdded ? 'grab' : 'pointer';
  }
});

mapWrap.addEventListener('mouseleave', () => {
  mapClickHint.classList.remove('show');
  mapWrap.style.cursor = 'grab';
});

// Track mousedown position to distinguish click from drag
mapWrap.addEventListener('mousedown', (e) => {
  clickDownPos = { x: e.clientX, y: e.clientY };
}, true);

mapWrap.addEventListener('click', (e) => {
  // Ignore if it was a drag (moved more than 5px)
  if (clickDownPos) {
    const dist = Math.hypot(e.clientX - clickDownPos.x, e.clientY - clickDownPos.y);
    if (dist > 5) return;
  }
  // Ignore clicks on labels/controls
  if (e.target.closest('.city-label') || e.target.closest('.control-panel')) return;

  const svgPt = screenToSVG(e.clientX, e.clientY);
  const nearest = findNearestCity(svgPt.x, svgPt.y);
  if (nearest) {
    addCity(nearest);
    mapClickHint.classList.remove('show');
  }
});

function positionLabels() {
  const labels = labelsContainer.querySelectorAll('.city-label');
  const wrapRect = mapWrap.getBoundingClientRect();
  labels.forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const city = selectedCities[idx];
    if (!city) return;
    const sx = lngToSVGX(city.lng), sy = latToSVGY(city.lat);
    // Pick the wrapped copy (center, left, right) that's most visible
    let bestX = null, bestDist = Infinity;
    for (const offset of [-1000, 0, 1000]) {
      const screen = svgToScreen(sx + offset, sy);
      const dist = Math.abs(screen.x - wrapRect.width / 2);
      if (dist < bestDist) { bestDist = dist; bestX = screen.x; }
    }
    const screen = svgToScreen(sx, sy);
    el.style.left = bestX + 'px';
    el.style.top = screen.y + 'px';
  });
  // Position date labels
  positionDateLabels();
}

function tickLabels() {
  const labels = labelsContainer.querySelectorAll('.cl-time');
  labels.forEach(el => {
    const tz = el.dataset.tz;
    if (tz) el.textContent = formatTime(tz);
  });
}

// ============ SOLAR TERMINATOR (DAY/NIGHT OVERLAY) ============
const dayPathEl = document.getElementById('dayPath');
const twilightPathEl = document.getElementById('twilightPath');
const nightPathEl = document.getElementById('nightPath');
const dayPathLEl = document.getElementById('dayPathL');
const twilightPathLEl = document.getElementById('twilightPathL');
const nightPathLEl = document.getElementById('nightPathL');
const dayPathREl = document.getElementById('dayPathR');
const twilightPathREl = document.getElementById('twilightPathR');
const nightPathREl = document.getElementById('nightPathR');

function getSolarDeclination(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  const diff = date - start;
  const dayOfYear = Math.floor(diff / 86400000);
  return -23.44 * Math.PI / 180 * Math.cos(2 * Math.PI / 365 * (dayOfYear + 10));
}

function getSubsolarLng(date) {
  const h = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
  let lng = (12 - h) * 15;
  while (lng < -180) lng += 360;
  while (lng > 180) lng -= 360;
  return lng;
}

function getSolarElevation(latDeg, lngDeg, decl, subsolarLng) {
  const latRad = latDeg * Math.PI / 180;
  const ha = (lngDeg - subsolarLng) * Math.PI / 180;
  return Math.sin(latRad) * Math.sin(decl) + Math.cos(latRad) * Math.cos(decl) * Math.cos(ha);
}

// For each longitude, binary-search the latitude where solar elevation crosses a threshold
function findTerminatorLat(lngDeg, decl, subsolarLng, threshold) {
  // The terminator for elev=0: tan(lat) = -cos(h)/tan(decl)
  // But this is simpler and more robust via binary search
  // We search from -90 to 90. The elevation function has at most one zero crossing
  // per hemisphere-half, so we pick the right half based on the subsolar point.

  // First check if the entire longitude column is fully day or fully night
  const elevN = getSolarElevation(89.9, lngDeg, decl, subsolarLng);
  const elevS = getSolarElevation(-89.9, lngDeg, decl, subsolarLng);
  const elevEq = getSolarElevation(0, lngDeg, decl, subsolarLng);

  // We want the boundary between the day side and night side
  // Search for where elevation crosses the threshold
  // There can be one crossing. Find it between -90 and 90.

  let lo = -90, hi = 90;
  const elevLo = getSolarElevation(lo, lngDeg, decl, subsolarLng);
  const elevHi = getSolarElevation(hi, lngDeg, decl, subsolarLng);

  // If both sides are same sign relative to threshold, no crossing
  if ((elevLo - threshold > 0) === (elevHi - threshold > 0)) {
    return null; // fully day or fully night
  }

  // Binary search for the crossing
  for (let i = 0; i < 30; i++) {
    const mid = (lo + hi) / 2;
    const elevMid = getSolarElevation(mid, lngDeg, decl, subsolarLng);
    if ((elevMid - threshold > 0) === (elevLo - threshold > 0)) {
      lo = mid;
    } else {
      hi = mid;
    }
  }
  return (lo + hi) / 2;
}

function updateDayNight() {
  const now = new Date();
  const decl = getSolarDeclination(now);
  const subsolarLng = getSubsolarLng(now);

  const steps = 200;
  const terminatorPts = []; // elev = 0 boundary
  const twilightPts = [];   // elev = -6° boundary

  for (let i = 0; i <= steps; i++) {
    const lng = -180 + (360 * i / steps);

    const tLat = findTerminatorLat(lng, decl, subsolarLng, 0);
    if (tLat !== null) {
      terminatorPts.push({ lng, lat: tLat });
    } else {
      // Fully lit or fully dark — push pole
      const elev = getSolarElevation(0, lng, decl, subsolarLng);
      terminatorPts.push({ lng, lat: elev > 0 ? -90 : 90 });
    }

    const twLat = findTerminatorLat(lng, decl, subsolarLng, Math.sin(-6 * Math.PI / 180));
    if (twLat !== null) {
      twilightPts.push({ lng, lat: twLat });
    } else {
      const elev = getSolarElevation(0, lng, decl, subsolarLng);
      twilightPts.push({ lng, lat: elev > 0 ? -90 : 90 });
    }
  }

  // Determine which pole is the "night" side
  // Check: is the north pole in darkness?
  const northElev = getSolarElevation(89, 0, decl, subsolarLng);
  // The night side extends from the terminator toward the pole that's dark
  // But it's hemisphere-dependent per longitude. Simpler: the night region is
  // on the side of the terminator AWAY from the subsolar point.
  // For each terminator point, the night side is in the direction where elevation < 0.

  // Check which side of the first terminator point is night
  const testPt = terminatorPts[0];
  const elevAbove = getSolarElevation(Math.min(89, testPt.lat + 5), testPt.lng, decl, subsolarLng);
  const nightIsAbove = elevAbove < 0; // "above" = higher lat = lower SVG Y

  // Night path: from terminator curve → along one edge (the dark pole)
  const nightPoleY = nightIsAbove ? latToSVGY(90) : latToSVGY(-90);
  let nightD = 'M';
  terminatorPts.forEach((p, i) => {
    nightD += (i === 0 ? '' : 'L') + lngToSVGX(p.lng).toFixed(1) + ',' + latToSVGY(p.lat).toFixed(1);
  });
  nightD += `L1000,${nightPoleY.toFixed(1)}L0,${nightPoleY.toFixed(1)}Z`;
  nightPathEl.setAttribute('d', nightD);

  // Day path: terminator curve → along the opposite (sunlit) edge
  const dayPoleY = nightIsAbove ? latToSVGY(-90) : latToSVGY(90);
  let dayD = 'M';
  terminatorPts.forEach((p, i) => {
    dayD += (i === 0 ? '' : 'L') + lngToSVGX(p.lng).toFixed(1) + ',' + latToSVGY(p.lat).toFixed(1);
  });
  dayD += `L1000,${dayPoleY.toFixed(1)}L0,${dayPoleY.toFixed(1)}Z`;
  dayPathEl.setAttribute('d', dayD);

  // Twilight band: area between terminator and civil twilight curves
  let twD = 'M';
  terminatorPts.forEach((p, i) => {
    twD += (i === 0 ? '' : 'L') + lngToSVGX(p.lng).toFixed(1) + ',' + latToSVGY(p.lat).toFixed(1);
  });
  for (let i = twilightPts.length - 1; i >= 0; i--) {
    const p = twilightPts[i];
    twD += 'L' + lngToSVGX(p.lng).toFixed(1) + ',' + latToSVGY(p.lat).toFixed(1);
  }
  twD += 'Z';
  twilightPathEl.setAttribute('d', twD);

  // Copy path data to left and right tile overlays
  dayPathLEl.setAttribute('d', dayD);
  dayPathREl.setAttribute('d', dayD);
  nightPathLEl.setAttribute('d', nightD);
  nightPathREl.setAttribute('d', nightD);
  twilightPathLEl.setAttribute('d', twD);
  twilightPathREl.setAttribute('d', twD);
}

// ============ DATE LINE ============
const dateLineEl = document.getElementById('dateLine');
const dateLine2El = document.getElementById('dateLine2');
const dateLine3El = document.getElementById('dateLine3');
const dateLabelLeftEl = document.getElementById('dateLabelLeft');
const dateLabelRightEl = document.getElementById('dateLabelRight');

function getMidnightLng() {
  const now = new Date();
  let lng = -(now.getUTCHours() + now.getUTCMinutes() / 60) * 15;
  while (lng < -180) lng += 360;
  return lng;
}

function updateDateLine() {
  const lng = getMidnightLng();
  const sx = lngToSVGX(lng);
  dateLineEl.setAttribute('x1', sx);
  dateLineEl.setAttribute('x2', sx);
  // Position the wrapped copies at ±1000 offset
  dateLine2El.setAttribute('x1', sx + 1000);
  dateLine2El.setAttribute('x2', sx + 1000);
  dateLine3El.setAttribute('x1', sx - 1000);
  dateLine3El.setAttribute('x2', sx - 1000);

  // The midnight line divides two calendar dates:
  // East of it: just past midnight → the NEW day
  // West of it: just before midnight → the OLD day
  // We compute solar local time by shifting UTC by longitude/15 hours,
  // then format as UTC since the offset is already baked in.
  const now = new Date();
  const fmt = d => d.toLocaleDateString('en-US',{timeZone:'UTC', weekday:'short',month:'short',day:'numeric'});

  const westDate = new Date(now.getTime() + ((lng - 1) / 15) * 3600000);
  const eastDate = new Date(now.getTime() + ((lng + 1) / 15) * 3600000);

  dateLabelLeftEl.textContent = fmt(westDate);
  dateLabelRightEl.textContent = fmt(eastDate);

  // Determine which date is "your" date (the user's current local date)
  const userDate = now.toLocaleDateString('en-US',{timeZone: localTZ, weekday:'short',month:'short',day:'numeric'});
  const leftIsToday = fmt(westDate) === userDate;
  const rightIsToday = fmt(eastDate) === userDate;

  dateLabelLeftEl.classList.toggle('today', leftIsToday);
  dateLabelLeftEl.classList.toggle('other-day', !leftIsToday);
  dateLabelRightEl.classList.toggle('today', rightIsToday);
  dateLabelRightEl.classList.toggle('other-day', !rightIsToday);

  positionDateLabels();
}

function positionDateLabels() {
  const lng = getMidnightLng();
  const sx = lngToSVGX(lng);
  // Position near the bottom of the map, above the controls bar
  const rect = mapWrap.getBoundingClientRect();
  const bottomY = rect.height - 80; // above the controls with clearance
  // Pick the best wrapped X position (closest to center of view)
  let bestX = null, bestDist = Infinity;
  for (const offset of [-1000, 0, 1000]) {
    const screen = svgToScreen(sx + offset, latToSVGY(0));
    const dist = Math.abs(screen.x - rect.width / 2);
    if (dist < bestDist) { bestDist = dist; bestX = screen.x; }
  }
  dateLabelLeftEl.style.left = bestX + 'px';
  dateLabelLeftEl.style.top = bottomY + 'px';
  dateLabelRightEl.style.left = bestX + 'px';
  dateLabelRightEl.style.top = bottomY + 'px';
}

// ============ HELPERS ============
function formatTime(tz, date) {
  return new Date(date || Date.now()).toLocaleTimeString('en-US', {
    timeZone: tz, hour:'2-digit', minute:'2-digit', hour12:true
  });
}
function getOffsetDiff(tz1, tz2) {
  const now = new Date();
  const d1 = new Date(now.toLocaleString('en-US',{timeZone:tz1}));
  const d2 = new Date(now.toLocaleString('en-US',{timeZone:tz2}));
  return Math.round((d2-d1)/(1000*60*60)*10)/10;
}

// ============ FUTURE TIME ============
const futureTimeInput = document.getElementById('futureTime');
const clearBtn = document.getElementById('clearFuture');

function parseTimeFlexible(raw) {
  const str = raw.trim().toLowerCase().replace(/\s+/g,'');
  if (!str) return null;

  let h = null, min = 0, isPM = false, isAM = false;

  // Detect am/pm suffix
  if (str.endsWith('pm') || str.endsWith('p')) { isPM = true; }
  if (str.endsWith('am') || str.endsWith('a')) { isAM = true; }
  // Strip am/pm suffix
  const nums = str.replace(/(am|pm|a|p)$/i, '');

  // "1700" or "0930" — 4 digits, no colon
  const m4 = nums.match(/^(\d{3,4})$/);
  if (m4) {
    const n = m4[1].padStart(4, '0');
    h = parseInt(n.slice(0, 2));
    min = parseInt(n.slice(2));
  }

  // "17:00" or "9:30" — with colon
  if (h === null) {
    const mc = nums.match(/^(\d{1,2}):(\d{2})$/);
    if (mc) { h = parseInt(mc[1]); min = parseInt(mc[2]); }
  }

  // "10" or "5" — just an hour
  if (h === null) {
    const mh = nums.match(/^(\d{1,2})$/);
    if (mh) { h = parseInt(mh[1]); min = 0; }
  }

  if (h === null) return null;

  // Apply AM/PM
  if (isPM && h >= 1 && h <= 11) h += 12;
  if (isAM && h === 12) h = 0;
  // If someone types "12pm" keep as 12; "12am" becomes 0

  if (h < 0 || h > 23 || min < 0 || min > 59) return null;
  return { h, min };
}

function onFutureChange() {
  const t = parseTimeFlexible(futureTimeInput.value);
  if (t) {
    futureMode = true;
    clearBtn.style.display = '';
    // Use today's date with the entered time
    const now = new Date();
    const dateStr = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + 'T' +
      String(t.h).padStart(2,'0') + ':' + String(t.min).padStart(2,'0') + ':00';
    const target = new Date(dateStr);
    let guess = new Date(dateStr);
    for (let i = 0; i < 4; i++) {
      const g = new Date(guess.toLocaleString('en-US',{timeZone:localTZ}));
      guess = new Date(guess.getTime() + (target - g));
    }
    futureUTCMoment = guess;
  } else {
    futureMode = false;
    futureUTCMoment = null;
    clearBtn.style.display = 'none';
  }
  rebuildLabels();
}
function clearFutureTime() {
  futureTimeInput.value = '';
  futureMode = false;
  futureUTCMoment = null;
  clearBtn.style.display = 'none';
  rebuildLabels();
}
futureTimeInput.addEventListener('input', onFutureChange);
futureTimeInput.addEventListener('change', onFutureChange);

// ============ HOME LOCATION PICKER ============
const homeTzLabel = document.getElementById('homeTzLabel');
const homePicker = document.getElementById('homePicker');
const homeSearch = document.getElementById('homeSearch');
const homeResults = document.getElementById('homeResults');

function getHomeCityName() {
  const city = CITIES.find(c => c.tz === localTZ);
  return city ? city.name : localTZ.split('/').pop().replace(/_/g, ' ');
}

function updateHomeTzLabel() {
  homeTzLabel.textContent = getHomeCityName();
}

function toggleHomePicker() {
  homePicker.classList.toggle('show');
  if (homePicker.classList.contains('show')) {
    homeSearch.value = '';
    homeSearch.focus();
    renderHomeResults('');
  }
}

function renderHomeResults(q) {
  q = q.toLowerCase();
  const matches = CITIES.filter(c =>
    !q || c.name.toLowerCase().includes(q) || c.country.toLowerCase().includes(q)
  ).slice(0, 12);
  homeResults.innerHTML = matches.map(c => `
    <div class="home-picker-item" data-name="${c.name}" data-country="${c.country}">
      <span><strong>${c.name}</strong> <span style="color:#64748b">— ${c.country}</span></span>
      <span class="tz-label">${c.tz.split('/').pop().replace(/_/g,' ')}</span>
    </div>`).join('');
  homeResults.querySelectorAll('.home-picker-item').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const city = CITIES.find(c => c.name===item.dataset.name && c.country===item.dataset.country);
      if (city) {
        localTZ = city.tz;
        try { localStorage.setItem('wtm_home', localTZ); } catch(e){}
        updateHomeTzLabel();
        rebuildLabels();
        updateDateLine();
        if (futureMode) onFutureChange();
      }
      homePicker.classList.remove('show');
    });
  });
}

homeSearch.addEventListener('input', () => renderHomeResults(homeSearch.value.trim()));
homeSearch.addEventListener('mousedown', e => e.stopPropagation());
document.addEventListener('click', e => {
  if (!e.target.closest('#homeBtn')) homePicker.classList.remove('show');
});

// ============ PERSISTENCE ============
function saveState() {
  try { localStorage.setItem('wtm3', JSON.stringify(selectedCities.map(c=>({n:c.name,c:c.country})))); } catch(e){}
}
function loadState() {
  try {
    (JSON.parse(localStorage.getItem('wtm3')||'[]')).forEach(s => {
      const city = CITIES.find(c=>c.name===s.n&&c.country===s.c);
      if (city && !selectedCities.find(c=>c.name===city.name)) selectedCities.push(city);
    });
  } catch(e){}
  // Load saved home timezone
  try {
    const savedHome = localStorage.getItem('wtm_home');
    if (savedHome) localTZ = savedHome;
  } catch(e){}
}

// ============ INIT ============
function init() {
  // Force pixel dimensions as fallback for iOS WebView where CSS vh/dvh may fail
  const vh = window.innerHeight || document.documentElement.clientHeight || 500;
  const vw = window.innerWidth || document.documentElement.clientWidth || 375;
  mapWrap.style.width = vw + 'px';
  mapWrap.style.height = vh + 'px';

  loadState();
  updateHomeTzLabel();
  if (selectedCities.length === 0) {
    const home = CITIES.find(c=>c.tz===localTZ);
    if (home) selectedCities.push(home);
    ['London','New York','Tokyo','Dubai'].forEach(n => {
      if (!selectedCities.find(c=>c.name===n)) {
        const c = CITIES.find(x=>x.name===n);
        if (c) selectedCities.push(c);
      }
    });
  }
  vb.w = getDefaultW(); // fill vertically on load
  updateViewBox();
  rebuildLabels();
  updateDateLine();
  updateDayNight();
  setInterval(tickLabels, 1000);
  setInterval(updateDateLine, 30000);
  setInterval(updateDayNight, 60000); // update every minute
  window.addEventListener('resize', () => {
    const vh = window.innerHeight || document.documentElement.clientHeight || 500;
    const vw = window.innerWidth || document.documentElement.clientWidth || 375;
    mapWrap.style.width = vw + 'px';
    mapWrap.style.height = vh + 'px';
    updateViewBox();
  });
}
try { init(); } catch(e) { document.body.innerHTML = '<pre style="color:red;padding:20px">' + e.message + '\n' + e.stack + '</pre>'; }
</script>
